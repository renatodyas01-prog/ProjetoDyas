d<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechCore Assistência</title>

<style>
:root {
--bg:#030a18;
--card:#081224;
--line:rgba(255,255,255,0.06);
--text:#fff;
--muted:#9fb0c7;
--blue:#4a86f7;
--green:#22c55e;
}

body{
margin:0;
font-family:Arial;
color:var(--text);
background:
linear-gradient(rgba(4,8,18,0.92),rgba(4,8,18,0.96)),
url('logo.png') center/cover no-repeat fixed;
}

.wrap{width:min(100% - 20px,1200px);margin:auto;}

h1{font-size:40px;}

.tabs{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap;}
.tab{
padding:10px 16px;
border-radius:20px;
border:1px solid var(--line);
background:#111;
cursor:pointer;
}
.tab.active{
background:var(--blue);
border:none;
}

.tab-pane{display:none;}
.tab-pane.active{display:block;}

input,select,textarea{
width:100%;
padding:12px;
margin:5px 0;
border-radius:10px;
border:none;
background:#111;
color:#fff;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:var(--blue);
color:#fff;
cursor:pointer;
}

.check{display:flex;gap:10px;margin:10px 0;cursor:pointer;}

.total{font-size:30px;margin:15px 0;color:var(--green);}

.whats-float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:#fff;
padding:15px;
border-radius:50%;
font-size:22px;
text-decoration:none;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="wrap">

<h1>Orçamento rápido TechCore</h1>

<div style="color:#22c55e;font-weight:bold;margin-bottom:10px;">
Passo 1: Cliente → Passo 2: Notebook → Passo 3: Serviços
</div>

<div class="tabs">
<button class="tab active" data-tab="cliente">Passo 1 • Cliente</button>
<button class="tab" data-tab="notebook">Passo 2 • Notebook</button>
<button class="tab" data-tab="servicos">Passo 3 • Serviços</button>
</div>

<!-- CLIENTE -->
<div id="cliente" class="tab-pane active">
<input id="nome" placeholder="Nome">
<input id="bairro" placeholder="Bairro">
<input id="contato" placeholder="WhatsApp">
</div>

<!-- NOTEBOOK -->
<div id="notebook" class="tab-pane">
<input id="marca" placeholder="Marca">
<select id="cpuTipo">
<option value="">Processador</option>
<option>i3</option>
<option>i5</option>
<option>i7</option>
</select>

<select id="cpuGeracao">
<option value="">Geração</option>
<option value="6">6</option>
<option value="8">8</option>
<option value="10">10</option>
<option value="11">11+</option>
</select>
</div>

<!-- SERVIÇOS -->
<div id="servicos" class="tab-pane">
<label class="check"><input type="checkbox" value="140"> Formatação</label>
<label class="check"><input type="checkbox" value="190"> Formatação + backup</label>
<label class="check"><input type="checkbox" value="680"> Troca de tela</label>
<label class="check"><input type="checkbox" value="490"> Teclado</label>
<label class="check"><input type="checkbox" id="carcaca"> Carcaça automática</label>
</div>

<div class="total">R$ <span id="total">0</span></div>

<button onclick="enviar()">Enviar orçamento</button>

</div>

<a class="whats-float" href="https://wa.me/5549991204177">💬</a>

<script>

let total=0;

const checkboxes=document.querySelectorAll("input[type=checkbox]");
const totalEl=document.getElementById("total");

function calcular(){
total=0;

checkboxes.forEach(c=>{
if(c.checked && c.value){
total+=parseInt(c.value);
}
});

if(document.getElementById("carcaca").checked){
let g=parseInt(document.getElementById("cpuGeracao").value);
if(g<=6) total+=460;
else if(g<=10) total+=580;
else total+=650;
}

totalEl.innerText=total;
}

checkboxes.forEach(c=>c.addEventListener("change",calcular));
document.getElementById("cpuGeracao").addEventListener("change",calcular);

function enviar(){
let nome=document.getElementById("nome").value;
let marca=document.getElementById("marca").value;

let msg=`Olá, fiz um orçamento na TechCore:

Cliente: ${nome}
Notebook: ${marca}
Total: R$ ${total}

Meu problema é:`;

window.open(`https://wa.me/5549991204177?text=${encodeURIComponent(msg)}`);
}

/* TABS */
document.querySelectorAll(".tab").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".tab-pane").forEach(p=>p.classList.remove("active"));

btn.classList.add("active");
document.getElementById(btn.dataset.tab).classList.add("active");
};
});

</script>

</body>
</html>
