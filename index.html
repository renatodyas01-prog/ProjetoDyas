<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechCore Assistência</title>

<style>
body{
margin:0;
font-family:Arial;
color:#fff;
background:linear-gradient(rgba(0,0,0,0.9),rgba(0,0,0,0.95)),url('logo.png') center/cover no-repeat fixed;
}

.wrap{max-width:900px;margin:auto;padding:20px;}

.tab-pane{display:none;}
.tab-pane.active{display:block;}

.tab{
padding:10px 16px;
border-radius:20px;
background:#111;
border:1px solid #333;
}

.tab.active{background:#2563eb;}

input,select,textarea{
width:100%;
padding:12px;
margin:5px 0;
border-radius:10px;
border:none;
background:#111;
color:#fff;
}

button{
padding:14px;
border:none;
border-radius:10px;
background:#2563eb;
color:#fff;
cursor:pointer;
}

.total{font-size:28px;margin:15px 0;color:#22c55e;}
</style>
</head>

<body>

<div class="wrap">

<h2>Orçamento TechCore</h2>

<div style="display:flex; gap:10px; margin-bottom:15px;">
<div class="tab active">Passo 1 • Cliente</div>
<div class="tab">Passo 2 • Notebook</div>
<div class="tab">Passo 3 • Serviços</div>
</div>

<!-- CLIENTE -->
<div id="tab-cliente" class="tab-pane active">
<input id="nome" placeholder="Nome">
<input id="contato" placeholder="WhatsApp">
</div>

<!-- NOTEBOOK -->
<div id="tab-notebook" class="tab-pane">
<input id="marca" placeholder="Marca">
<select id="cpuTipo">
<option value="">Processador</option>
<option>i3</option>
<option>i5</option>
<option>i7</option>
</select>

<select id="cpuGeracao">
<option value="">Geração</option>
<option value="6">6</option>
<option value="8">8</option>
<option value="10">10</option>
<option value="11">11+</option>
</select>
</div>

<!-- SERVIÇOS -->
<div id="tab-servicos" class="tab-pane">
<label><input type="checkbox" value="140"> Formatação</label><br>
<label><input type="checkbox" value="190"> Formatação + backup</label><br>
<label><input type="checkbox" value="680"> Tela</label><br>
<label><input type="checkbox" value="490"> Teclado</label><br>
<label><input type="checkbox" id="carcaca"> Carcaça automática</label>
</div>

<div class="total">R$ <span id="total">0</span></div>

<button id="btnNext">Seguinte</button>

</div>

<script>

let passo=1;
let total=0;

const btn=document.getElementById("btnNext");

function mostrar(p){
document.querySelectorAll(".tab-pane").forEach(el=>el.classList.remove("active"));

if(p==1) document.getElementById("tab-cliente").classList.add("active");
if(p==2) document.getElementById("tab-notebook").classList.add("active");
if(p==3) document.getElementById("tab-servicos").classList.add("active");

btn.innerText = (p==3) ? "Gerar orçamento" : "Seguinte";
}

btn.onclick=()=>{

if(passo==1){
if(!nome.value || !contato.value){
alert("Preencha seus dados");
return;
}
passo=2;
}

else if(passo==2){
if(!marca.value || !cpuTipo.value || !cpuGeracao.value){
alert("Preencha dados do notebook");
return;
}
passo=3;
}

else{
enviar();
return;
}

mostrar(passo);
}

function calcular(){
total=0;

document.querySelectorAll("input[type=checkbox]").forEach(c=>{
if(c.checked && c.value){
total+=parseInt(c.value);
}
});

if(document.getElementById("carcaca").checked){
let g=parseInt(cpuGeracao.value);

if(g<=6) total+=460;
else if(g<=10) total+=580;
else total+=650;
}

document.getElementById("total").innerText=total;
}

document.querySelectorAll("input[type=checkbox]").forEach(c=>{
c.addEventListener("change",calcular);
});

cpuGeracao.addEventListener("change",calcular);

function enviar(){

let msg=`Olá, fiz um orçamento na TechCore:

Cliente: ${nome.value}
Notebook: ${marca.value}
Total: R$ ${total}

Meu problema é:`;

window.open(`https://wa.me/5549991204177?text=${encodeURIComponent(msg)}`);

}

</script>

</body>
</html>
