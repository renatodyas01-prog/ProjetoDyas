<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechCore Assistência</title>

<style>

body{
margin:0;
font-family:Arial;
color:#fff;
background:
linear-gradient(rgba(4,8,18,0.92),rgba(4,8,18,0.96)),
url('logo.png') center/cover no-repeat fixed;
}

/* CONTAINER */
.wrap{
max-width:1000px;
margin:auto;
padding:20px;
}

/* HEADER */
h1{
font-size:32px;
margin-bottom:20px;
}

/* PASSOS */
.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tab{
padding:10px 16px;
border-radius:20px;
background:#111;
border:1px solid #333;
opacity:0.5;
}

.tab.active{
background:#2563eb;
opacity:1;
}

/* FORM */
.tab-pane{display:none;}
.tab-pane.active{display:block;}

input,select,textarea{
width:100%;
padding:14px;
margin:8px 0;
border-radius:12px;
border:1px solid rgba(255,255,255,0.08);
background:#081224;
color:#fff;
}

/* CHECKBOX */
.check{
display:flex;
gap:10px;
margin:10px 0;
cursor:pointer;
}

/* TOTAL */
.total{
font-size:34px;
color:#22c55e;
margin:20px 0;
}

/* BOTÃO */
button{
padding:14px;
border:none;
border-radius:12px;
background:#2563eb;
color:#fff;
cursor:pointer;
font-weight:bold;
}

</style>
</head>

<body>

<div class="wrap">

<h1>Orçamento TechCore</h1>

<!-- PASSOS -->
<div class="tabs">
<div class="tab active">Passo 1 • Cliente</div>
<div class="tab">Passo 2 • Notebook</div>
<div class="tab">Passo 3 • Serviços</div>
</div>

<!-- CLIENTE -->
<div id="step1" class="tab-pane active">
<input id="nome" placeholder="Nome">
<input id="bairro" placeholder="Bairro">
<input id="contato" placeholder="WhatsApp">
<textarea id="obs" placeholder="Problema do notebook"></textarea>
</div>

<!-- NOTEBOOK -->
<div id="step2" class="tab-pane">
<input id="marca" placeholder="Marca do notebook">

<select id="cpuTipo">
<option value="">Processador</option>
<option value="i3">i3</option>
<option value="i5">i5</option>
<option value="i7">i7</option>
</select>

<select id="cpuGeracao">
<option value="">Geração</option>
<option value="6">6ª</option>
<option value="8">8ª</option>
<option value="10">10ª</option>
<option value="11">11+</option>
</select>
</div>

<!-- SERVIÇOS -->
<div id="step3" class="tab-pane">

<label class="check"><input type="checkbox" class="servico" value="140"> Formatação</label>
<label class="check"><input type="checkbox" class="servico" value="190"> Formatação + backup</label>
<label class="check"><input type="checkbox" class="servico" value="680"> Troca de tela</label>
<label class="check"><input type="checkbox" class="servico" value="490"> Teclado</label>
<label class="check"><input type="checkbox" id="carcaca"> Reparo de carcaça (automático)</label>

</div>

<!-- TOTAL -->
<div class="total">R$ <span id="total">0</span></div>

<button id="btnNext">Seguinte</button>

</div>

<script>

// CONTROLE DE PASSO
let passo = 1;

const btn = document.getElementById("btnNext");
const tabs = document.querySelectorAll(".tab");
const panes = document.querySelectorAll(".tab-pane");

function atualizarTela(){
panes.forEach(p=>p.classList.remove("active"));
tabs.forEach(t=>t.classList.remove("active"));

panes[passo-1].classList.add("active");
tabs[passo-1].classList.add("active");

btn.innerText = passo === 3 ? "Gerar orçamento" : "Seguinte";
}

// BOTÃO
btn.onclick = ()=>{

if(passo === 1){
if(!nome.value || !contato.value){
alert("Preencha seus dados");
return;
}
passo++;
}

else if(passo === 2){
if(!marca.value || !cpuTipo.value || !cpuGeracao.value){
alert("Preencha os dados do notebook");
return;
}
passo++;
}

else{
enviar();
return;
}

atualizarTela();
};

// CALCULO
function calcular(){

let total = 0;

// serviços
document.querySelectorAll(".servico").forEach(c=>{
if(c.checked) total += parseInt(c.value);
});

// carcaça automática
if(document.getElementById("carcaca").checked){

let g = parseInt(cpuGeracao.value);

if(g){
if(g <= 6) total += 460;
else if(g <= 10) total += 580;
else total += 650;
}
}

document.getElementById("total").innerText = total;
}

// EVENTOS
document.querySelectorAll(".servico").forEach(c=>{
c.addEventListener("change", calcular);
});

cpuGeracao.addEventListener("change", calcular);
document.getElementById("carcaca").addEventListener("change", calcular);

// WHATSAPP
function enviar(){

let msg = `Olá, fiz um orçamento na TechCore:

Cliente: ${nome.value}
Bairro: ${bairro.value}
Contato: ${contato.value}

Notebook: ${marca.value} ${cpuTipo.value} ${cpuGeracao.value}

Total: R$ ${document.getElementById("total").innerText}

Problema:
${obs.value}`;

window.open(`https://wa.me/5549991204177?text=${encodeURIComponent(msg)}`);

}

</script>

</body>
</html>
