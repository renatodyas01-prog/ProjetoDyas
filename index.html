<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechCore Assistência</title>

<style>

body{
margin:0;
font-family:Arial;
color:#fff;
background:linear-gradient(rgba(0,0,0,0.9),rgba(0,0,0,0.95)),url('logo.png') center/cover no-repeat fixed;
}

.wrap{max-width:800px;margin:auto;padding:20px;}

.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab{
padding:10px 16px;
border-radius:20px;
background:#111;
border:1px solid #333;
opacity:0.5;
}

.tab.active{
background:#2563eb;
opacity:1;
}

.tab-pane{display:none;}
.tab-pane.active{display:block;}

input,select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
background:#111;
color:#fff;
}

button{
padding:14px;
border:none;
border-radius:10px;
background:#2563eb;
color:#fff;
cursor:pointer;
}

.total{
font-size:28px;
margin:15px 0;
color:#22c55e;
}

</style>
</head>

<body>

<div class="wrap">

<h2>Orçamento TechCore</h2>

<div class="tabs">
<div class="tab active">Passo 1 • Cliente</div>
<div class="tab">Passo 2 • Notebook</div>
<div class="tab">Passo 3 • Serviços</div>
</div>

<!-- CLIENTE -->
<div id="tab1" class="tab-pane active">
<input id="nome" placeholder="Nome">
<input id="contato" placeholder="WhatsApp">
</div>

<!-- NOTEBOOK -->
<div id="tab2" class="tab-pane">
<input id="marca" placeholder="Marca">

<select id="cpuTipo">
<option value="">Processador</option>
<option>i3</option>
<option>i5</option>
<option>i7</option>
</select>

<select id="cpuGeracao">
<option value="">Geração</option>
<option value="6">6</option>
<option value="8">8</option>
<option value="10">10</option>
<option value="11">11+</option>
</select>
</div>

<!-- SERVIÇOS -->
<div id="tab3" class="tab-pane">

<label><input type="checkbox" class="servico" value="140"> Formatação</label><br>
<label><input type="checkbox" class="servico" value="190"> Formatação + backup</label><br>
<label><input type="checkbox" class="servico" value="680"> Tela</label><br>
<label><input type="checkbox" class="servico" value="490"> Teclado</label><br>
<label><input type="checkbox" id="carcaca"> Carcaça automática</label>

</div>

<div class="total">R$ <span id="total">0</span></div>

<button id="next">Seguinte</button>

</div>

<script>

let passo = 1;

const next = document.getElementById("next");
const tabs = document.querySelectorAll(".tab");
const panes = document.querySelectorAll(".tab-pane");

function mostrar(){
panes.forEach(p=>p.classList.remove("active"));
tabs.forEach(t=>t.classList.remove("active"));

panes[passo-1].classList.add("active");
tabs[passo-1].classList.add("active");

next.innerText = passo === 3 ? "Gerar orçamento" : "Seguinte";
}

next.onclick = ()=>{

if(passo === 1){
if(!nome.value || !contato.value){
alert("Preencha seus dados");
return;
}
passo++;
}

else if(passo === 2){
if(!marca.value || !cpuTipo.value || !cpuGeracao.value){
alert("Preencha os dados do notebook");
return;
}
passo++;
}

else{
enviar();
return;
}

mostrar();
};

function calcular(){

let total = 0;

// serviços
document.querySelectorAll(".servico").forEach(c=>{
if(c.checked) total += parseInt(c.value);
});

// carcaça
if(document.getElementById("carcaca").checked){

let g = parseInt(cpuGeracao.value);

if(g){
if(g <= 6) total += 460;
else if(g <= 10) total += 580;
else total += 650;
}
}

document.getElementById("total").innerText = total;
}

document.querySelectorAll(".servico").forEach(c=>{
c.addEventListener("change", calcular);
});

cpuGeracao.addEventListener("change", calcular);
document.getElementById("carcaca").addEventListener("change", calcular);

function enviar(){

let msg = `Olá, fiz um orçamento na TechCore:

Cliente: ${nome.value}
Notebook: ${marca.value}
Total: R$ ${document.getElementById("total").innerText}

Meu problema é:`;

window.open(`https://wa.me/5549991204177?text=${encodeURIComponent(msg)}`);

}

</script>

</body>
</html>
